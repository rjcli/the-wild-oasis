# ─────────────────────────────────────────────────────────────────────────────
# Wild Oasis — Docker Compose
#
# Services
#   postgres  – PostgreSQL 16 database
#   api       – Node.js / Express / Prisma REST API
#   ui        – React / Vite SPA served by nginx
#
# Usage
#   cp .env.example .env && edit .env
#   docker compose up --build          # build images + start all services
#   docker compose up --build -d       # same, detached
#   docker compose down                # stop & remove containers
#   docker compose down -v             # also remove named volumes
# ─────────────────────────────────────────────────────────────────────────────

name: wild-oasis

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend


  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: wild-oasis-api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:               production
      PORT:                   3000
      DATABASE_URL:           postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET:             ${JWT_SECRET}
      JWT_EXPIRES_IN:         ${JWT_EXPIRES_IN:-1d}
      JWT_REFRESH_SECRET:     ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      # Allow requests from the UI container (nginx on port 80)
      CORS_ORIGINS:           ${CORS_ORIGINS:-http://localhost}
      MAX_FILE_SIZE_MB:       ${MAX_FILE_SIZE_MB:-5}
      UPLOADS_DIR:            public/uploads
    volumes:
      - api_uploads:/app/public/uploads
    ports:
      - "${API_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend
      - frontend


  # ── UI ──────────────────────────────────────────────────────────────────────
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time
        VITE_API_ORIGIN: ${VITE_API_ORIGIN:-http://localhost:3000}
        VITE_API_URL:    ${VITE_API_URL:-http://localhost:3000/api/v1}
    image: wild-oasis-ui:latest
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${UI_PORT:-80}:80"
    networks:
      - frontend


# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge


# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  api_uploads:
